name : daejeon_yeojido

services:
   mysql:
     image: mysql:8.0
     container_name: DY-mysql

     ports:
       - "3307:3306"

     environment:
       MYSQL_DATABASE: ${MYSQL_DATABASE}
       MYSQL_USER: ${MYSQL_USER}
       MYSQL_PASSWORD: ${MYSQL_PASSWORD}
       MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

     volumes:
       - mysql_data:/var/lib/mysql

   app:
     build: .
     container_name: DY-backend

     ports:
       - "8080:8080"

     environment:
       SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
       SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
       SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
       SPRING_PROFILES_ACTIVE: docker

     depends_on:
       - mysql

volumes:
 mysql_data: